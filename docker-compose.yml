services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./simulation:/app/simulation
      - ./simulation_history.db:/app/simulation_history.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.api       # reuse same image
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./simulation:/app/simulation
    depends_on:
      - api
